name: Tauri CI Build Nightly

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.0.0)"
        required: true
        default: "nightly"
      name:
        description: "Release name"
        required: true
        default: "Nightly Build"
      prerelease:
        description: "Is this a prerelease?"
        required: true
        type: boolean
        default: true
      draft:
        description: "Create as draft?"
        required: true
        type: boolean
        default: false
      resumeUrl:
        required: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Debug resumeUrl
        shell: bash
        run: |
          echo "resumeUrl=${{ github.event.inputs.resumeUrl }}"

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Build Tauri
        env: 
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: pnpm tauri build

      - name: Create/Update Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.inputs.tag || format('nightly-{0}', github.run_id) }}
          name: ${{ github.event.inputs.name || format('Nightly Build {0}', github.run_id) }}
          draft: ${{ github.event.inputs.draft || false }}
          prerelease: ${{ github.event.inputs.prerelease || true }}
          files: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify n8n (resume)
        if: always()
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.resumeUrl }}" ]; then
            echo "Sending callback to n8n..."
            curl -X POST "${{ github.event.inputs.resumeUrl }}" \
              -H "Content-Type: application/json" \
              -d "{\"status\":\"done\",\"run_id\":\"${{ github.run_id }}\"}"
          else
            echo "No resumeUrl provided, skipping callback"
          fi
