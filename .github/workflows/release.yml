name: Tauri CI Build & Release
on:
    push:
        tags:
            - 'v*'
    workflow_dispatch:
concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true
jobs:
    build:
        if: github.head_ref != 'l10n_crowdin_translations'
        runs-on: windows-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v6
            - name: Setup pnpm
              uses: pnpm/action-setup@v5
              with:
                  version: 9
            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: 'pnpm'
            - name: Setup Rust
              uses: dtolnay/rust-toolchain@stable
            - name: Cache Rust
              uses: Swatinem/rust-cache@v2
            - name: Install frontend deps
              run: pnpm install --frozen-lockfile
            - name: Build Tauri
              env:
                  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
              run: pnpm tauri build
            - name: Get metadata
              if: startsWith(github.ref, 'refs/tags/v')
              id: meta
              shell: bash
              run: |
                  VERSION="${GITHUB_REF_NAME}"
                  DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
                  echo "version=$VERSION" >> $GITHUB_OUTPUT
                  echo "date=$DATE" >> $GITHUB_OUTPUT
            - name: Generate updater.json
              if: startsWith(github.ref, 'refs/tags/v')
              shell: bash
              run: |
                  VERSION="${{ steps.meta.outputs.version }}"
                  DATE="${{ steps.meta.outputs.date }}"
                  EXE_PATH=$(ls src-tauri/target/release/bundle/nsis/*.exe | head -n 1)
                  SIG_PATH="${EXE_PATH}.sig"
                  echo "EXE: $EXE_PATH"
                  echo "SIG: $SIG_PATH"
                  if [ ! -f "$SIG_PATH" ]; then
                      echo "Signature file not found!"
                      exit 1
                  fi
                  # Base64 encode signature (single line)
                  SIGNATURE=$(base64 -w 0 "$SIG_PATH")
                  FILE_NAME=$(basename "$EXE_PATH")
                  cat > updater.json <<EOF
                  {
                    "version": "$VERSION",
                    "notes": "Updater test!",
                    "pub_date": "$DATE",
                    "platforms": {
                      "windows-x86_64": {
                        "signature": "$SIGNATURE",
                        "url": "https://github.com/${{ github.repository }}/releases/download/$VERSION/$FILE_NAME"
                      }
                    }
                  }
                  EOF
            - name: Upload build artifacts
              uses: actions/upload-artifact@v7
              with:
                  name: tauri-windows-build
                  path: |
                      src-tauri/target/release/bundle/nsis/*.exe
                      updater.json
            - name: Upload release assets
              if: startsWith(github.ref, 'refs/tags/v')
              uses: softprops/action-gh-release@v2
              with:
                  files: |
                      src-tauri/target/release/bundle/nsis/*.exe
                      updater.json
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}